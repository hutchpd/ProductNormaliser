<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Multiple Products</title>
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": "Sony Bravia 55",
        "brand": "Sony",
        "sku": "KD55X75WL"
      },
      {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": "Panasonic MX800",
        "brand": "Panasonic",
        "sku": "TX-55MX800B",
        "additionalProperty": [
          {
            "@type": "PropertyValue",
            "name": "Display Technology",
            "value": "LED"
          }
        ]
      }
    ]
    </script>
</head>
<body>
    <main>Product Listing</main>
</body>
</html>
